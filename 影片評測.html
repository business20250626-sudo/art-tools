<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1e222b; --line:#2a2f3a;
    --tx:#e8eaf0; --tx2:#a8b0c0; --tx3:#7b8499;
    --accent:#7c9cff; --accent2:#5ad1c4; --gold:#e8c14b;
    --sidebar:248px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--tx);
    font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif;
    line-height:1.7;font-size:15px;}
  .nav{position:sticky;top:0;z-index:30;background:rgba(15,17,21,.92);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}
  .nav .inner{max-width:1280px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .nav .brand{font-weight:700;font-size:15px;margin-right:10px;letter-spacing:.5px;}
  .nav a{color:var(--tx2);text-decoration:none;font-size:14px;padding:7px 13px;border-radius:9px;border:1px solid transparent;transition:.15s;}
  .nav a:hover{color:#fff;border-color:var(--line);}
  .nav a.on{background:var(--accent);color:#0f1115;font-weight:700;}
  .nav a.soon{color:var(--tx3);cursor:default;}
  .nav a.soon::after{content:"即將推出";font-size:10px;margin-left:6px;color:var(--tx3);border:1px solid var(--line);border-radius:5px;padding:1px 5px;}
  .layout{max-width:1280px;margin:0 auto;display:flex;align-items:flex-start;}
  .side{width:var(--sidebar);flex:none;position:sticky;top:57px;align-self:flex-start;height:calc(100vh - 57px);overflow-y:auto;padding:22px 14px;border-right:1px solid var(--line);}
  .side .lbl{color:var(--tx3);font-size:11px;letter-spacing:1px;padding:4px 12px;margin:10px 0 4px;}
  .side a{display:flex;align-items:center;gap:10px;color:var(--tx2);text-decoration:none;font-size:14px;padding:8px 12px;border-radius:10px;transition:.15s;margin-bottom:2px;}
  .side a:hover{background:var(--panel2);color:#fff;}
  .side a.active{background:var(--accent);color:#0f1115;font-weight:700;}
  .content{flex:1 1 auto;min-width:0;padding:30px 34px 100px;}
  h1{font-size:27px;margin:0 0 6px;letter-spacing:.5px;}
  .sub{color:var(--tx2);font-size:14px;margin-bottom:6px;}
  section{margin:0 0 10px;padding-top:16px;}
  section+section{border-top:1px solid var(--line);margin-top:34px;padding-top:34px;}
  h2{font-size:21px;margin:0 0 14px;display:flex;align-items:center;gap:10px;scroll-margin-top:72px;}
  h2 .ic{font-size:20px;}
  h3.grp{font-size:15px;color:var(--accent2);margin:22px 0 8px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:14px;}
  .card p{margin:6px 0;color:var(--tx2);}
  .card ul{margin:8px 0;padding-left:20px;color:var(--tx2);}
  .card li{margin:5px 0;}
  b,strong{color:#fff;}
  .prompt{position:relative;background:#0b0d12;border:1px solid var(--line);border-radius:11px;padding:14px 16px;margin:8px 0;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;color:#cdd3e0;line-height:1.6;white-space:pre-wrap;}
  .prompt .cp{position:absolute;top:10px;right:10px;background:var(--panel2);border:1px solid var(--line);color:var(--tx2);border-radius:7px;font-size:12px;padding:5px 11px;cursor:pointer;}
  .prompt .cp:hover{border-color:var(--accent);background:var(--accent);color:#0f1115;}
  .focus{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0 2px;}
  .focus span{font-size:12px;border:1px solid var(--line);border-radius:6px;padding:2px 9px;color:var(--tx2);background:var(--panel2);}
  table.rb{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;font-size:14px;margin:4px 0 6px;}
  table.rb th,table.rb td{padding:9px 13px;text-align:left;border-bottom:1px solid var(--line);}
  table.rb th{background:var(--panel2);color:var(--tx2);font-size:12px;}
  table.rb tr:last-child td{border-bottom:none;}
  table.rb td.pt{color:var(--gold);font-weight:700;white-space:nowrap;}
  /* accordion */
  .acc{border:1px solid var(--line);border-radius:12px;margin:8px 0;overflow:hidden;background:var(--panel);}
  .acc-h{width:100%;display:flex;align-items:center;gap:12px;padding:12px 16px;background:none;border:0;color:var(--tx);font-size:15px;cursor:pointer;text-align:left;font-family:inherit;}
  .acc-h:hover{background:var(--panel2);}
  .acc-h .rank{width:22px;height:22px;flex:none;display:inline-flex;align-items:center;justify-content:center;background:var(--panel2);border:1px solid var(--line);border-radius:6px;font-size:12px;color:var(--tx2);}
  .acc-h .nm{font-weight:700;min-width:128px;}
  .acc-h .prov{font-size:12px;color:var(--tx3);}
  .acc-h .score{color:var(--gold);font-weight:700;font-size:17px;min-width:32px;margin-left:auto;}
  .acc-h .score.sc-none{color:var(--tx3);font-size:15px;}
  .acc-h .brk{color:var(--tx3);font-size:12px;}
  .acc-h .chev{color:var(--tx3);transition:.15s;margin-left:10px;flex:none;}
  .acc-h.open .chev{transform:rotate(90deg);color:var(--accent2);}
  .acc-b{display:none;padding:8px 16px 16px;border-top:1px solid var(--line);}
  .acc-b.open{display:block;}
  .vpair{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  figure.v{margin:0;}
  figure.v .tag{font-size:12.5px;color:var(--tx2);margin-bottom:6px;font-weight:600;}
  .vid{width:100%;height:240px;background:#000;border:1px solid var(--line);border-radius:11px;display:block;}
  .ph{width:100%;height:240px;border:1.5px dashed var(--line);border-radius:11px;background:var(--panel2);
    display:flex;align-items:center;justify-content:center;text-align:center;color:var(--tx3);font-size:13px;padding:20px;}
  .ph code{color:var(--accent);font-size:12px;}
  @media(max-width:760px){.side{display:none;} .content{padding:24px 18px 80px;} .vpair{grid-template-columns:1fr;}}
</style>
</head>

        <li><b>同一 prompt</b>，各模型每個測試各生成 1 支，設定盡量用預設。</li>
        <li>比例 16:9；時長取各模型預設短版。</li>
      </ul>
    </div>
  </section>

<script>
function copyPrompt(btn){
  var t=btn.parentNode.textContent.replace(/^複製/,"").trim();

}
document.querySelectorAll(".acc-h").forEach(function(h){
  h.addEventListener("click",function(){
    var b=document.getElementById(h.getAttribute("data-t"));
    var open=h.classList.toggle("open"); if(b) b.classList.toggle("open",open);
  });
});
var links=[].slice.call(document.querySelectorAll(".side a"));
var map=links.map(function(a){return {a:a,sec:document.querySelector(a.getAttribute("href"))};}).filter(function(m){return m.sec;});
var obs=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){map.forEach(function(m){m.a.classList.toggle("active",m.sec===e.target);});}});},{rootMargin:"-40% 0px -55% 0px"});
map.forEach(function(m){obs.observe(m.sec);});
</script>
